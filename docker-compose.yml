services:
  llama_cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama_cpp
    gpus: all
    ports:
      - "8000:8000"
    volumes:
      - ./quenmodel:/models:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    command: |
      -m /models/Qwen3.5-2B-Q8_0.gguf
      --host 0.0.0.0
      --port 8000
      --n-gpu-layers 99
      --metrics


  # rewrite open webui to also pull from llamacpp for its backend
  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: open-webui
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - llama_cpp
    ports:
      - ${OPEN_WEBUI_PORT-3001}:8080
    environment:
      - 'OLLAMA_BASE_URL=http://llama_cpp:8000'
    


    # run own grafana
    # run own prometheus that scrapes the exporter of everyone's machines

  grafana:
    image: grafana/grafana:12.4
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dcgm_grafana_dash.json:/var/lib/grafana/dashboards/dcgm_grafana_dash.json:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_DISABLE_LOGIN_FORM=true

  prometheus:
    image: prom/prometheus:v3.11.2
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  dcgm-exporter:
    image: nvidia/dcgm-exporter:4.4.1-4.6.0-ubuntu22.04
    container_name: dcgm-exporter
    gpus: all
    ports:
      - "9400:9400"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility



volumes:
  open-webui:
  grafana_data: